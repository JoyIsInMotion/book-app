<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookVault</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/typography.css" />
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="stylesheet" href="styles/navigation.css" />
  <link rel="stylesheet" href="styles/welcome.css" />
  <link rel="stylesheet" href="styles/all-books.css" />
  <link rel="stylesheet" href="styles/details.css" />
  <link rel="stylesheet" href="styles/create-edit.css" />
  <link rel="stylesheet" href="styles/login-register.css" />
  <link rel="stylesheet" href="styles/comments.css" />
</head>
<body>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║         NAVIGATION           ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <nav id="site-nav">
    <div className="nav-inner">
      <a className="nav-brand" href="/">BookVault</a>

      <!-- Guest links (shown when NOT logged in) -->
      <div id="guest-nav">
        <a href="/catalogue">All Books</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      </div>

      <!-- User links (shown when logged in) -->
      <div id="user-nav" style="display:none">
        <a href="/catalogue">All Books</a>
        <a href="/add-book">Add Book</a>
        <span id="user-email"></span>
        <a href="#" id="logout-btn">Logout</a>
      </div>
    </div>
  </nav>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║        VIEW CONTAINER        ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    All views are rendered into #main-content.
    Each "page" is a JS module that:
      1. Fetches data from the REST API
      2. Builds HTML as a string (or DOM nodes)
      3. Sets innerHTML of #main-content

    You can structure this however you like —
    hash routing, pushState, or a simple switch.
  -->
  <main id="main-content">
    <!-- Views render here -->
  </main>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║    HOME VIEW TEMPLATE        ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    HINT — Home page shows 3 recent picks (one per genre).
    Endpoint: GET /data/books?sortBy=_createdOn%20desc&distinct=genre

    Expected layout:
      <section className="home-hero">...</section>
      <section className="recent-picks">
        <h2>Recently Added</h2>
        <div className="picks-grid">
          <!-- one .book-card per result -->
        </div>
      </section>
  -->

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║  CATALOGUE VIEW TEMPLATE     ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    HINT — All Books page
    Endpoint: GET /data/books?sortBy=_createdOn%20desc

    Expected layout:
      <section className="catalogue">
        <h1>All Books</h1>
        <div className="books-grid">
          <!-- one .book-card per book -->
          <!-- <p className="empty-state">No books in the vault yet.</p> if empty -->
        </div>
      </section>
  -->

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║   DETAILS VIEW TEMPLATE      ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    HINT — Book Details page
    Endpoint: GET /data/books/:id

    Show all fields. Conditionally show Edit/Delete if _ownerId === current user _id.
    Include Comments section at the bottom (bonus).
  -->

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║  CREATE/EDIT VIEW TEMPLATE   ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    HINT — Add / Edit Book (auth required)
    Fields: title, author, genre, imageUrl, description

    Create: POST /data/books
    Edit:   PUT  /data/books/:id  (pre-fill form with existing values)
  -->

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║  LOGIN / REGISTER TEMPLATES  ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    Login:    POST /users/login    { email, password }
    Register: POST /users/register { email, password }
    Logout:   GET  /users/logout   (X-Authorization header required)

    On success → store { _id, email, accessToken } → redirect to Home
  -->

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║          YOUR JS             ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <!--
    Suggested entry point — uncomment when ready:
    <script type="module" src="src/app.js"></script>
  -->

</body>
</html>
